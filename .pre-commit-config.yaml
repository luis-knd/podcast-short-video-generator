exclude: ^src/interface/rest/generated/.*$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [ "--allow-missing-credentials" ]
      - id: pretty-format-json
      - id: name-tests-test

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args:
          - "--select=E,W,F,ERA,UP,BLE,B,C4,SIM"
          - "--fix"
          - "--line-length=120"
      - id: ruff-format

  - repo: local
    hooks:
      - id: pylint-no-self-use
        name: pylint (method may be static)
        language: python
        entry: pylint
        types: [python]
        additional_dependencies:
          - pylint>=3.3.0
        args:
          - "--disable=all"
          - "--enable=R6301"
          - "--load-plugins=pylint.extensions.no_self_use"

  # Secrets scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        pass_filenames: false

  # Branch name check
  - repo: local
    hooks:
      - id: branch-name-check
        name: Branch name and length check
        entry: |
          bash -c '
          MAX_LENGTH=72
          branch_name=$(git symbolic-ref --quiet --short HEAD 2>/dev/null || git branch --show-current)
          if [ -z "$branch_name" ] || [ "$branch_name" = "HEAD" ]; then
            echo "Error: No se pudo resolver el nombre de la rama actual."
            exit 1
          fi
          if [ ${#branch_name} -gt $MAX_LENGTH ]; then
            echo "Error: El nombre de la rama '\''$branch_name'\'' excede la longitud máxima de caracteres $MAX_LENGTH."
            exit 1
          fi

          if ! [[ $branch_name =~ ^(feature|bugfix|hotfix|release)/EWS-[0-9]+- ]]; then
            echo "Error: El nombre de la rama '\''$branch_name'\'' no sigue el patrón requerido."
            exit 1
          fi

          exit 0
          '
        language: system
        stages: [ commit, push ]
