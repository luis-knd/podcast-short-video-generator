name: PR - Performance Smoke

on:
  pull_request:
    branches:
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "requirements*.txt"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: pr-performance-smoke-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  performance_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect performance anti-patterns (ruff PERF)
        run: ruff check src --select PERF --line-length 120

      - name: Generate profiling report (pyinstrument)
        run: pyinstrument -r text -m pytest -q tests/unit/use_cases > pyinstrument-report.txt

      - name: Upload profiling report
        uses: actions/upload-artifact@v4
        with:
          name: pyinstrument-report
          path: pyinstrument-report.txt
