name: PR - Lint and Types

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - "requirements*.txt"

permissions:
  contents: read

concurrency:
  group: pr-lint-and-types-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    if: ${{ github.event.pull_request.base.ref == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src tests --select E,W,F,ERA,UP,BLE,B,C4,SIM --line-length 120
