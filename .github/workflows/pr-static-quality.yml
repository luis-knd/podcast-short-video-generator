name: PR - Static Quality

on:
  pull_request:
    branches:
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - "requirements*.txt"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: pr-static-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static_quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enforce method/class size
        run: |
          python scripts/quality/check_code_size.py \
            --max-method-lines 50 \
            --max-class-lines 300 \
            --baseline-file scripts/quality/baselines/code_size_baseline.txt \
            src

      - name: Detect dead code (vulture)
        continue-on-error: true
        run: vulture src --min-confidence 80 --exclude "src/interface/rest/generated/"

      - name: Detect duplicated code (pylint)
        continue-on-error: true
        run: pylint --disable=all --enable=duplicate-code --min-similarity-lines=12 --ignore-paths='src/interface/rest/generated/.*|src/application/ports/.*' src
