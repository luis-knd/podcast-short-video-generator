name: PR - Static Quality

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - "requirements*.txt"

permissions:
  contents: read

concurrency:
  group: pr-static-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static_quality:
    if: ${{ github.event.pull_request.base.ref == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect dead code (vulture)
        continue-on-error: true
        run: vulture src --min-confidence 80

      - name: Detect duplicated code (pylint)
        continue-on-error: true
        run: pylint src tests --disable=all --enable=duplicate-code --min-similarity-lines=12
