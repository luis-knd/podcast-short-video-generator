name: PR - Mutation Tests

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "requirements*.txt"

permissions:
  contents: read

concurrency:
  group: pr-mutation-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mutation_tests:
    if: ${{ github.event.pull_request.base.ref == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "mutmut<3"

      - name: Run mutation tests
        run: mutmut run --CI --no-progress --simple-output

      - name: Check mutation coverage
        run: |
          SURVIVED=$(mutmut result-ids survived | wc -w | tr -d ' ')
          KILLED=$(mutmut result-ids killed | wc -w | tr -d ' ')
          TIMEOUT=$(mutmut result-ids timeout | wc -w | tr -d ' ')
          SUSPICIOUS=$(mutmut result-ids suspicious | wc -w | tr -d ' ')
          TOTAL=$((SURVIVED + KILLED + TIMEOUT + SUSPICIOUS))

          if [ $TOTAL -eq 0 ]; then
            echo "No mutations found"
            exit 0
          fi

          SCORE=$(awk "BEGIN {printf \"%.2f\", ($KILLED + $TIMEOUT) * 100 / $TOTAL}")
          echo "Mutation score: $SCORE%"
          echo "Killed: $KILLED, Survived: $SURVIVED, Timeout: $TIMEOUT, Suspicious: $SUSPICIOUS"

          if (( $(echo "$SCORE < 90" | bc -l) )); then
            echo "ERROR: Mutation coverage $SCORE% is below 90%"
            exit 1
          fi
